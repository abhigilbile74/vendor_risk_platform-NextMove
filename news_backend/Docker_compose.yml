version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: news_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: news_intelligence

  redis:
    image: redis:7-alpine
    container_name: news_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  api:
    build: .
    container_name: news_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
    volumes:
      - ./ml/saved_models:/app/ml/saved_models
      - ./logs:/app/logs
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data: